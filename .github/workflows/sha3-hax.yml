name: SHA3 - hax

on:
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "crates/algorithms/sha3/**"

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      hax_ref:
        description: "The hax revision you want this job to use"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTE: This always runs, even if the `hax_ref` workflow input is provided.
  # TODO: Move this reusable workflow to a standalone action
  get-hax-ref:
    uses: ./.github/workflows/get-hax-ref.yml

  extract:
    runs-on: ubuntu-latest
    needs:
      - get-hax-ref

    steps:
      - uses: actions/checkout@v6
      - uses: hacspec/hax-actions@main
        with:
          hax_reference: ${{ github.event.inputs.hax_ref || needs.get-hax-ref.outputs.hax_ref }}

      - name: 🏃 Extract SHA3 crate
        working-directory: crates/algorithms/sha3
        run: ./hax.py extract

      - name: ↑ Upload F* extraction (standard)
        uses: actions/upload-artifact@v6
        with:
          name: fstar-extractions-standard
          path: "**/proofs/fstar"
          include-hidden-files: true
          if-no-files-found: error

  extract-portable:
    runs-on: ubuntu-latest
    needs:
      - get-hax-ref

    steps:
      - uses: actions/checkout@v6
      - uses: hacspec/hax-actions@main
        with:
          hax_reference: ${{ github.event.inputs.hax_ref || needs.get-hax-ref.outputs.hax_ref }}
          fstar: v2025.12.15

      - name: 🏃 Extract SHA3 crate (portable)
        working-directory: crates/algorithms/sha3
        run: ./hax.py extract --portable

      - name: ↑ Upload F* extraction (portable)
        uses: actions/upload-artifact@v6
        with:
          name: fstar-extractions-portable
          path: "**/proofs/fstar"
          include-hidden-files: true
          if-no-files-found: error

  lax-portable:
    runs-on: ubuntu-latest
    needs:
      - get-hax-ref
      - extract-portable
    steps:
      - uses: actions/checkout@v6
      - uses: hacspec/hax-actions@main
        with:
          hax_reference: ${{ github.event.inputs.hax_ref || needs.get-hax-ref.outputs.hax_ref }}
          fstar: v2025.12.15

      - uses: actions/download-artifact@v7
        with:
          name: fstar-extractions-portable
          path: .

      - name: 🏃 Lax SHA3 crate (portable)
        working-directory: crates/algorithms/sha3
        run: ./hax.py prove --admit
