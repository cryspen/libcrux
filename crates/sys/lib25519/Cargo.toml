[package]
name = "lib25519"

authors = ["Cryspen"]
description = "sys crate for lib25519 on linux and macOS."
edition = "2021"
homepage = "https://github.com/cryspen/libcrux"
license = "Apache-2.0"
publish = false
readme = "Readme.md"
repository = "https://github.com/cryspen/libcrux"
version = "0.0.1"

[dependencies]
libc = "0.2"

[build-dependencies]
bindgen = { version = "0.72", optional = true }
cc = { version = "1.1", features = ["parallel"] }
pkg-config = "0.3"
