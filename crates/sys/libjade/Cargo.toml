[package]
name = "libjade-sys"

authors = ["Cryspen"]
description = "Rust bindings for libjade, a formally verified cryptographic library written in jasmin."
edition = "2021"
homepage = "https://github.com/cryspen/libcrux"
license = "Apache-2.0"
publish = false
readme = "Readme.md"
repository = "https://github.com/cryspen/libcrux"
version = "0.0.3"

[dependencies]

[build-dependencies]
cc = { version = "1.1", features = ["parallel"] }
libcrux-platform = { version = "=0.0.3", path = "../platform" }

[target.'cfg(not(windows))'.build-dependencies]
bindgen = { version = "0.72", optional = true }

[dev-dependencies]
pretty_env_logger = "0.5"

[features]
bindings = ["bindgen"]
